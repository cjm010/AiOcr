name: CI

on:
  pull_request:
    branches: [dev, test, main]
  push:
    branches: [dev]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Smoke import check
        env:
          APP_ENV: ci
          ENABLE_TEMPLATE_LEARNING: "false"
        run: python -c "from src.doc_ai.config import get_settings; from src.doc_ai.pipeline import DocumentPipeline; s = get_settings(); DocumentPipeline(s); print(s.data_dir)"

      - name: Run tests
        env:
          APP_ENV: ci
        run: pytest tests/ -v
