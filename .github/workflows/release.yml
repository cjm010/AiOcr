name: Release Gate

on:
  push:
    branches: [main]

jobs:
  verify-main:
    name: Full test suite + smoke check
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run full test suite
        env:
          APP_ENV: ci
        run: pytest tests/ -v

      - name: Production smoke check
        env:
          APP_ENV: prod
          APP_DATA_DIR: data/prod
          ENABLE_TEMPLATE_LEARNING: "false"
        run: python -c "from src.doc_ai.config import get_settings; from src.doc_ai.pipeline import DocumentPipeline; s = get_settings(); DocumentPipeline(s); print('prod-ready', s.data_dir)"
